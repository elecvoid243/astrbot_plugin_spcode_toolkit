name: astrbot_plugin_spcode_toolkit
author: elecvoid243
display_name: spcode 工具箱
version: 2.9.0
description: |
  spcode 开发工具箱 — 13 个工具，5 个命令组。
  code_check / es_search / file_remove / file_compare / inta_shell_*(5个)
  todo_create / todo_query / todo_modify / todo_clear(4 个,通过 `todo_list` 组别名一键启用)。
  v2.0 自动集成 codegraph 官方 MCP server。
  v2.4 合并 AGENTS.md 管理(/agentsmd)。
  v2.5 合并交互式 Shell 工具(/inta_shell start|send|read|stop|list)。
  v2.6 重构 todo_list 单工具为 4 工具 API。
  v2.6.1 配置页:把 todo_list 4 个子工具收纳为单一 `todo_list` 组别名,与 inta_shell 同等 UX;
    旧 config 中独立勾选的 todo_* 工具名继续生效,无需手动改。
  v2.7 新增 /project load|unload 命令组,一键组合 agentsmd+codegraph;
    加载后自动注入 codegraph 优先使用指引,引导 LLM 走语义搜索而非 astrbot_file_grep_tool。
  v2.8 新增 /plan 和 /build 命令(opencode plan/build 模式借鉴);
    /plan 激活时按 plan_mode.blocked_tools 配置从 LLM 工具列表过滤写工具,
    并在第一轮 LLM 调用时向 user message 注入 plan 模式 reminder(prefix cache 友好);
    /build 退出 plan 模式,默认状态下完全不修改 LLM 请求,与 AstrBot 默认行为一致。
  v2.9 todo_create 新增 from_path 参数:从 .md 文件领养(adopt)todo 列表;
    与 items 参数互斥,需绝对路径,1MB 上限,保留 status/notes 但重排 ID 从 1、
    改写 sender_key 为当前用户、updated_at = now()。
  部分实现基于Irmia DevKit插件。
repo: https://github.com/elecvoid243/astrbot_plugin_spcode_toolkit
